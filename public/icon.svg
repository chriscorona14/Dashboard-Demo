<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
    <rect width="512" height="512" rx="112" fill="#FFFFFF"/>
    
    <g transform="translate(256, 256)">
        <!-- Green Ring -->
        <ellipse cx="-5" cy="5" rx="150" ry="135" transform="rotate(15)" stroke="#34A853" stroke-width="18" fill="none"/>
        
        <!-- Red Ring -->
        <ellipse cx="5" cy="-5" rx="150" ry="135" transform="rotate(-40)" stroke="#EA4335" stroke-width="20" fill="none"/>
        
        <!-- Blue Ring -->
        <ellipse cx="0" cy="-10" rx="160" ry="145" transform="rotate(-70)" stroke="#4285F4" stroke-width="24" fill="none"/>
        
        <!-- Orange/Yellow Ring -->
        <ellipse cx="-10" cy="10" rx="155" ry="140" transform="rotate(35)" stroke="#F9AB00" stroke-width="26" fill="none"/>
        
        <!-- Dots -->
        <circle cx="-110" cy="-130" r="16" fill="#F9AB00"/>
        <circle cx="160" cy="-40" r="16" fill="#EA4335"/>
        <circle cx="-140" cy="60" r="14" fill="#34A853"/>
        <circle cx="120" cy="140" r="20" fill="#4285F4"/>
    </g>
</svg>
